<svg viewBox="0 0 640 330" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, 'Apple SD Gothic Neo', sans-serif" role="img" aria-label="문항 2를 편집하면 그 노드와 조상(root)만 새 객체가 되고, 형제 가지는 옛 객체를 그대로 공유한다">
  <rect x="0.5" y="0.5" width="639" height="329" rx="18" fill="#101216" stroke="#1e222a"/>

  <text x="320" y="42" text-anchor="middle" fill="#7e8593" font-size="12.5" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" letter-spacing="0.5">문항 2 편집 · 구조적 공유</text>

  <!-- edges -->
  <path d="M296 100 L168 168" stroke="#333a46" stroke-width="1.5" fill="none"/>
  <path d="M320 102 L320 168" stroke="#7e9cd4" stroke-width="1.6" fill="none"/>
  <path d="M344 100 L472 168" stroke="#333a46" stroke-width="1.5" fill="none"/>

  <!-- root (new) -->
  <circle cx="320" cy="82" r="30" fill="#7e9cd4" fill-opacity="0.16" stroke="#7e9cd4" stroke-width="1.8"/>
  <text x="320" y="87" text-anchor="middle" fill="#8fb0ec" font-size="14" font-weight="600">root ′</text>

  <!-- 문항1 (shared) -->
  <circle cx="140" cy="198" r="32" fill="none" stroke="#333a46" stroke-width="1.5"/>
  <text x="140" y="203" text-anchor="middle" fill="#7e8593" font-size="13">문항 1</text>
  <!-- 문항2 (new) -->
  <circle cx="320" cy="198" r="32" fill="#7e9cd4" fill-opacity="0.16" stroke="#7e9cd4" stroke-width="1.8"/>
  <text x="320" y="203" text-anchor="middle" fill="#8fb0ec" font-size="13" font-weight="600">문항 2 ′</text>
  <!-- 문항3 (shared) -->
  <circle cx="500" cy="198" r="32" fill="none" stroke="#333a46" stroke-width="1.5"/>
  <text x="500" y="203" text-anchor="middle" fill="#7e8593" font-size="13">문항 3</text>

  <!-- node captions -->
  <text x="140" y="256" text-anchor="middle" fill="#7e8593" font-size="12">옛 객체 공유</text>
  <text x="320" y="256" text-anchor="middle" fill="#8fb0ec" font-size="12">새 객체</text>
  <text x="500" y="256" text-anchor="middle" fill="#7e8593" font-size="12">옛 객체 공유</text>

  <text x="320" y="298" text-anchor="middle" fill="#b7bdc8" font-size="13">편집된 노드와 조상만 새로 나고, 형제는 리렌더되지 않는다</text>
</svg>
