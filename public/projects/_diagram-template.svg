<!-- 케이스 스터디 다이어그램 템플릿 — diagram-style.md 참조. 복붙 후 <slug>-<개념>.svg 로 저장. -->
<!-- 규칙: 토큰 hex 하드코딩 · accent=변경/핵심, muted=배경/그대로 · <script>/<foreignObject>/외부href/<image> 금지 -->
<svg viewBox="0 0 640 330" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, 'Apple SD Gothic Neo', sans-serif" role="img" aria-label="여기에 figure thesis를 한 문장으로">
  <rect x="0.5" y="0.5" width="639" height="329" rx="18" fill="#101216" stroke="#1e222a"/>

  <!-- 상단 맥락 라벨(mono) -->
  <text x="320" y="42" text-anchor="middle" fill="#7e8593" font-size="12.5" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">맥락 · 무엇을 보이는지</text>

  <!-- 예시 엣지: 강조=accent, 배경=muted -->
  <path d="M320 100 L200 176" stroke="#333a46" stroke-width="1.5" fill="none"/>
  <path d="M320 102 L320 176" stroke="#7e9cd4" stroke-width="1.6" fill="none"/>
  <path d="M320 100 L440 176" stroke="#333a46" stroke-width="1.5" fill="none"/>

  <!-- 강조 노드(변경/핵심) -->
  <circle cx="320" cy="84" r="30" fill="#7e9cd4" fill-opacity="0.16" stroke="#7e9cd4" stroke-width="1.8"/>
  <text x="320" y="89" text-anchor="middle" fill="#8fb0ec" font-size="14" font-weight="600">핵심</text>

  <!-- 배경 노드(그대로/공유) -->
  <circle cx="200" cy="204" r="30" fill="none" stroke="#333a46" stroke-width="1.5"/>
  <text x="200" y="209" text-anchor="middle" fill="#7e8593" font-size="13">A</text>
  <circle cx="320" cy="204" r="30" fill="#7e9cd4" fill-opacity="0.16" stroke="#7e9cd4" stroke-width="1.8"/>
  <text x="320" y="209" text-anchor="middle" fill="#8fb0ec" font-size="13" font-weight="600">B ′</text>
  <circle cx="440" cy="204" r="30" fill="none" stroke="#333a46" stroke-width="1.5"/>
  <text x="440" y="209" text-anchor="middle" fill="#7e8593" font-size="13">C</text>

  <!-- 하단 한 줄 요지 -->
  <text x="320" y="300" text-anchor="middle" fill="#b7bdc8" font-size="13">한 줄 요지 — 그림이 증명하는 것</text>
</svg>
