<svg viewBox="0 0 680 330" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, 'Apple SD Gothic Neo', sans-serif" role="img" aria-label="정수 순번은 한 칸 삽입에 뒤 항목을 전부 다시 매기지만(O(n)), 사이값 키는 두 이웃 사이 새 키 하나만 발급한다(O(1))">
  <rect x="0.5" y="0.5" width="679" height="329" rx="18" fill="#101216" stroke="#1e222a"/>

  <text x="28" y="40" fill="#7e8593" font-size="12.5" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">한 칸 삽입 비용 · 형제 시퀀스</text>

  <!-- ROW A: 정수 순번 O(n) -->
  <text x="28" y="76" fill="#b7bdc8" font-size="13.5">정수 순번 — 한 칸 넣으면 뒤 전부 재번호</text>
  <!-- pill 1 (그대로) -->
  <rect x="28" y="86" width="88" height="42" rx="9" fill="#1b1f27" stroke="#2a2f3a"/>
  <text x="72" y="113" text-anchor="middle" fill="#b7bdc8" font-size="15">1</text>
  <!-- pill 2 (새) -->
  <rect x="130" y="86" width="88" height="42" rx="9" fill="#7e9cd4" fill-opacity="0.16" stroke="#7e9cd4" stroke-width="1.6"/>
  <text x="174" y="113" text-anchor="middle" fill="#8fb0ec" font-size="15" font-weight="600">2 ↩</text>
  <!-- pill 3 (재번호) -->
  <rect x="232" y="86" width="88" height="42" rx="9" fill="#7e9cd4" fill-opacity="0.16" stroke="#7e9cd4" stroke-width="1.6"/>
  <text x="276" y="113" text-anchor="middle" fill="#8fb0ec" font-size="15" font-weight="600">3 ↻</text>
  <!-- pill 4 (재번호) -->
  <rect x="334" y="86" width="88" height="42" rx="9" fill="#7e9cd4" fill-opacity="0.16" stroke="#7e9cd4" stroke-width="1.6"/>
  <text x="378" y="113" text-anchor="middle" fill="#8fb0ec" font-size="15" font-weight="600">4 ↻</text>
  <text x="28" y="150" fill="#7e8593" font-size="12">삽입 1개 → 재계산 3개 (뒤 형제 전부)</text>
  <text x="620" y="118" text-anchor="end" fill="#8fb0ec" font-size="24" font-weight="700">O(n)</text>

  <!-- divider -->
  <line x1="28" y1="176" x2="652" y2="176" stroke="#1e222a" stroke-width="1"/>

  <!-- ROW B: 사이값 키 O(1) -->
  <text x="28" y="212" fill="#b7bdc8" font-size="13.5">사이값 키(LexoRank식) — 두 이웃 사이 하나만</text>
  <rect x="28" y="222" width="88" height="42" rx="9" fill="#1b1f27" stroke="#2a2f3a"/>
  <text x="72" y="249" text-anchor="middle" fill="#b7bdc8" font-size="15">a0</text>
  <!-- 새 사이값 키 -->
  <rect x="130" y="222" width="88" height="42" rx="9" fill="#7e9cd4" fill-opacity="0.16" stroke="#7e9cd4" stroke-width="1.6"/>
  <text x="174" y="249" text-anchor="middle" fill="#8fb0ec" font-size="15" font-weight="600">a0V ↩</text>
  <rect x="232" y="222" width="88" height="42" rx="9" fill="#1b1f27" stroke="#2a2f3a"/>
  <text x="276" y="249" text-anchor="middle" fill="#b7bdc8" font-size="15">a1</text>
  <rect x="334" y="222" width="88" height="42" rx="9" fill="#1b1f27" stroke="#2a2f3a"/>
  <text x="378" y="249" text-anchor="middle" fill="#b7bdc8" font-size="15">a2</text>
  <text x="28" y="286" fill="#7e8593" font-size="12">삽입 1개 → 새 키 1개 (나머지 그대로)</text>
  <text x="620" y="254" text-anchor="end" fill="#8fb0ec" font-size="24" font-weight="700">O(1)</text>

  <!-- ↩ = 새로 발급, ↻ = 재번호 -->
  <text x="452" y="113" fill="#7e8593" font-size="11">↩ 새 · ↻ 재번호</text>
</svg>
